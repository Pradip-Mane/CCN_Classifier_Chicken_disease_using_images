<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chicken Disease Classifier</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">

    <style>
        body {
            background: #eef2f7;
            font-family: Arial;
        }

        .title {
            text-align: center;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #1b2d6b;
        }

        .box {
            border: 1px solid #ccc;
            padding: 15px;
            background: white;
            border-radius: 10px;
        }

        .image-box {
            width: 100%;
            height: 300px;
            border: 2px dashed #1b2d6b;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .image-box img {
            max-width: 100%;
            max-height: 100%;
            display: none;
        }

        #video {
            width: 100%;
            height: 300px;
        }

        .btn {
            margin-top: 10px;
        }

        .result-box {
            height: 300px;
            overflow: auto;
            border: 1px solid #ccc;
            padding: 10px;
            background: #fafafa;
        }

        #loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.7);
            z-index: 999;
            text-align: center;
            padding-top: 200px;
            font-size: 20px;
        }
    </style>
</head>

<body>

<div id="loading">🔄 Predicting...</div>

<div class="container">
    <div class="title">🐔 Chicken Disease Classifier</div>

    <div class="row">

        <!-- LEFT SIDE -->
        <div class="col-md-6">
            <div class="box">

                <div class="image-box">
                    <video id="video" autoplay></video>
                    <img id="photo">
                </div>

                <input type="file" id="fileinput" hidden>

                <button class="btn btn-primary btn-block" id="uload">
                    Upload Image
                </button>

                <button class="btn btn-success btn-block" id="send">
                    Predict
                </button>

                <input type="hidden" id="url" value="../predict">
            </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="col-md-6">
            <div class="box">
                <h5 class="text-center">Prediction Result</h5>

                <div class="result-box">
                    <div class="res-part"></div>
                    <div class="res-part2"></div>
                </div>

            </div>
        </div>

    </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>

<script>

let base_data = "";

/* ---------------- IMAGE UPLOAD ---------------- */
$("#uload").click(function () {
    $("#fileinput").click();
});

$("#fileinput").change(function () {

    let reader = new FileReader();

    reader.onload = function (e) {

        let img = new Image();
        img.src = e.target.result;

        img.onload = function () {

            let canvas = document.createElement("canvas");
            let ctx = canvas.getContext("2d");

            canvas.width = img.width;
            canvas.height = img.height;

            ctx.drawImage(img, 0, 0);

            base_data = canvas.toDataURL("image/jpeg", 1.0)
                .replace(/^data:image.+;base64,/, "");

            $("#photo").attr("src", e.target.result).show();
            $("#video").hide();
        };
    };

    reader.readAsDataURL(this.files[0]);
});


/* ---------------- PREDICT ---------------- */
$("#send").click(function () {
    sendRequest(base_data);
});


function sendRequest(base64Data) {

    if (!base64Data) {
        alert("Please upload image first!");
        return;
    }

    $("#loading").show();

    let url = $("#url").val();

    $.ajax({
        url: url,
        type: "POST",
        contentType: "application/json",
        data: JSON.stringify({ image: base64Data }),

        success: function (res) {

            $("#loading").hide();

            $(".res-part").html("");
            $(".res-part2").html("");

            try {
                $(".res-part").html("<pre>" + JSON.stringify(res[0], null, 2) + "</pre>");

                if (res[1] && res[1].image) {
                    $(".res-part2").html(
                        "<img style='width:100%' src='data:image/jpeg;base64," + res[1].image + "'/>"
                    );
                }

            } catch (e) {
                $(".res-part").html("Error parsing response");
            }
        },

        error: function () {
            $("#loading").hide();
            alert("Prediction failed. Check backend.");
        }
    });
}

</script>

</body>
</html>
